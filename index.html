<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <select id="language" onchange="changeLanguage()">
      <option value="en">🇬🇧 English</option>
      <option value="id">🇮🇩 Indonesia</option>
      <option value="jp">🇯🇵 Jepang</option>
      <option value="th">🇹🇭 Thailand</option>
    </select>
    <button id="themeBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
  </div>

  <div class="hero">
    <h1 id="greeting">Good Morning</h1>
    <p id="datetime"></p>
    <div class="name-row">
      <span id="displayName"></span>
      <button class="btn-link" onclick="openNameModal()">✏️</button>
    </div>
  </div>

  <!-- Name Modal -->
  <div id="nameModal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modalTitle">What's your name?</h3>
      <input id="nameInput" type="text" maxlength="30" placeholder="Your name..." />
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveName()">Save</button>
        <button class="btn-sec" onclick="closeNameModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- Timer -->
    <div class="card">
      <h2 id="timerTitle">🎯 Focus Timer</h2>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-setting">
        <label id="minutesLabel">Minutes:
          <input type="number" id="timerMinutes" min="1" max="99" value="25" />
        </label>
      </div>
      <div class="timer-btns">
        <button class="btn-primary" id="startBtn" onclick="startTimer()">Start</button>
        <button class="btn-sec" onclick="stopTimer()">Stop</button>
        <button class="btn-sec" onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <!-- To-Do -->
    <div class="card">
      <h2 id="todoTitle">📝 To-Do List</h2>
      <div class="input-row">
        <input id="taskInput" type="text" maxlength="100" placeholder="Add a task..." />
        <button class="btn-primary" onclick="addTask()" id="addTaskBtn">Add</button>
      </div>
      <ul id="taskList"></ul>
    </div>

    <!-- Quick Links -->
    <div class="card">
      <h2 id="linksTitle">🔗 Quick Links</h2>
      <div class="input-row">
        <input id="linkName" type="text" maxlength="30" placeholder="Label" />
        <input id="linkURL" type="url" maxlength="200" placeholder="https://..." />
        <button class="btn-primary" onclick="addLink()" id="addLinkBtn">Add</button>
      </div>
      <div id="linkList"></div>
    </div>

    <!-- Weather -->
    <div class="card weather-card">
      <h2 id="weatherTitle">🌤️ Weather</h2>
      <div id="weatherContent" class="weather-content">
        <div class="weather-loading" id="weatherLoading">📍 Detecting location...</div>
        <div id="weatherData" class="hidden">
          <div class="weather-main">
            <span id="weatherIcon" class="weather-icon"></span>
            <span id="weatherTemp" class="weather-temp"></span>
          </div>
          <div id="weatherDesc" class="weather-desc"></div>
          <div class="weather-details">
            <span id="weatherHumidity"></span>
            <span id="weatherWind"></span>
          </div>
          <div id="weatherLocation" class="weather-location"></div>
        </div>
        <div id="weatherError" class="hidden weather-error">
          ⚠️ <span id="weatherErrorMsg"></span>
          <button class="btn-sec" onclick="loadWeather()" style="margin-top:8px;font-size:0.8rem;padding:5px 12px;">Retry</button>
        </div>
      </div>
    </div>

  </div>

  <div class="wave-container">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path class="wave1" d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z"/>
    </svg>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
